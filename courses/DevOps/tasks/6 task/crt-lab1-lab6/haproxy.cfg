defaults
    mode tcp
    timeout client 30m
    timeout connect 4s
    timeout server 30m
    timeout check 5s

# ============================================
# HAProxy Statistics
# ============================================
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /

# ============================================
# PostgreSQL Cluster
# ============================================
listen postgres
    mode tcp
    bind *:5432
    option httpchk
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server postgresql_master_5432 pg-master:5432 maxconn 100 check port 8008
    server postgresql_slave_5432 pg-slave:5432 maxconn 100 check port 8008
