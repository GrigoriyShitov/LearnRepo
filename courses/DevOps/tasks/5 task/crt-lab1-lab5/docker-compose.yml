services:
  my-app-1:
    build: .
    image: my-python-app
    container_name: my-app-1
    depends_on:
      - rabbitmq
    ports:
      - "8001:8000"

  my-app-2:
    build: .
    image: my-python-app
    container_name: my-app-2
    depends_on:
      - rabbitmq
    ports:
      - "8002:8000"

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  pg-master:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: local-postgres:patroni
    container_name: pg-master
    hostname: pg-master
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: '/var/lib/postgresql/data/pgdata'
    expose:
      - 8008
    ports:
      - "5433:5432"
    volumes:
      - pg-master:/var/lib/postgresql/data
    command: patroni /postgres0.yml

  pg-slave:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: local-postgres:patroni
    container_name: pg-slave
    hostname: pg-slave
    expose:
      - 8008
    ports:
      - "5434:5432"
    volumes:
      - pg-slave:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: '/var/lib/postgresql/data/pgdata'
    command: patroni /postgres1.yml

  zoo:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: zoo
    hostname: zoo
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  haproxy:
    image: haproxy:3.0
    container_name: api-gateway
    ports:
      - 5432:5432
      - 7000:7000
    depends_on:
      - pg-master
      - pg-slave
      - zoo
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg

volumes:
  pg-master:
  pg-slave: